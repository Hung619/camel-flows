- route:
    id: sap-material-to-erpnext
    from:
      id: from-sap-material
      uri: platform-http
      parameters:
        httpMethodRestrict: POST
        consumes: application/json
        path: /api/sap/material
      steps:
        - log:
            id: log-material-received
            message: "Nhận Material từ SAP: ${body}"
        - log:
            id: log-0303
            message: ${header.CamelVertxPlatformHttpRemoteAddress}
        - unmarshal:
            id: unmarshal-5c8c
            json:
              id: json-1e14
        - removeHeaders:
            id: removeHeaders-515a
            pattern: "*"
        - transform:
            id: transform-material-groovy
            expression:
              groovy:
                id: groovy-bcb7
                expression: |
                  def sapData = request.body

                  def uomMap = [
                      "PC": "Nos",
                      "KG": "Kg",
                      "ST": "Nos"
                  ]

                  def erpNextData = [
                      item_code:       sapData.code ?: null,
                      item_name:       sapData.name ?: "Unknown Item Name",
                      is_stock_item:   (sapData.active ?: "0").toInteger(),
                      item_group:      "Products"
                  ]

                  return erpNextData
        - setProperty:
            id: setProperty-material-body
            name: materialBody
            expression:
              simple:
                id: simple-material-body
                expression: ${body}
        - marshal:
            id: marshal-d999
            json:
              id: json-66c7
        - setProperty:
            id: setProperty-material-json
            name: materialJson
            expression:
              simple:
                id: simple-material-json
                expression: ${body}
        - setHeaders:
            id: setHeaders-staging
            headers:
              - id: setHeader-staging-content
                name: Content-Type
                expression:
                  constant:
                    id: constant-staging-content
                    expression: application/json
              - id: setHeader-staging-method
                name: CamelHttpMethod
                expression:
                  constant:
                    id: constant-staging-method
                    expression: POST
              - id: setHeader-staging-auth
                name: Authorization
                expression:
                  constant:
                    id: constant-staging-auth
                    expression: token {{erpnext.staging.token}}
        - log:
            id: log-staging-request
            message: "Sending to STAGING: ${body}"
        - to:
            id: to-staging-material
            uri: https
            parameters:
              bridgeEndpoint: true
              throwExceptionOnFailure: false
              httpUri: "{{erpnext.staging.url}}{{erpnext.api.item}}"
        - setProperty:
            id: setProperty-staging-response
            name: stagingResponse
            expression:
              simple:
                id: simple-staging-resp
                expression: ${body}
        - setProperty:
            id: setProperty-staging-code
            name: stagingCode
            expression:
              simple:
                id: simple-staging-code
                expression: ${header.CamelHttpResponseCode}
        - log:
            id: log-staging-response
            message: "STAGING Response [${header.CamelHttpResponseCode}]: ${body}"
        - removeHeaders:
            id: removeHeaders-before-prod
            pattern: "*"
        - setBody:
            id: setBody-reset-prod
            expression:
              simple:
                id: simple-reset-prod
                expression: ${exchangeProperty.materialJson}
        - setHeaders:
            id: setHeaders-prod
            headers:
              - id: setHeader-prod-content
                name: Content-Type
                expression:
                  constant:
                    id: constant-prod-content
                    expression: application/json
              - id: setHeader-prod-method
                name: CamelHttpMethod
                expression:
                  constant:
                    id: constant-prod-method
                    expression: POST
              - id: setHeader-prod-auth
                name: Authorization
                expression:
                  constant:
                    id: constant-prod-auth
                    expression: token {{erpnext.production.token}}
        - log:
            id: log-prod-request
            message: "Sending to PRODUCTION: ${body}"
        - to:
            id: to-prod-material
            uri: https
            parameters:
              bridgeEndpoint: true
              throwExceptionOnFailure: false
              httpUri: "{{erpnext.production.url}}{{erpnext.api.item}}"
        - setProperty:
            id: setProperty-prod-response
            name: prodResponse
            expression:
              simple:
                id: simple-prod-resp
                expression: ${body}
        - setProperty:
            id: setProperty-prod-code
            name: prodCode
            expression:
              simple:
                id: simple-prod-code
                expression: ${header.CamelHttpResponseCode}
        - log:
            id: log-prod-response
            message: "PRODUCTION Response [${header.CamelHttpResponseCode}]: ${body}"
        - setBody:
            id: setBody-material-final
            expression:
              simple:
                id: simple-material-final-body
                expression: ${exchangeProperty.prodResponse}
        - setHeader:
            id: setHeader-final-content
            name: Content-Type
            expression:
              constant:
                id: constant-final-content
                expression: application/json
- route:
    id: route-sap-bom-sync
    from:
      id: from-sap-bom
      uri: platform-http
      parameters:
        path: /api/sap/bom
        httpMethodRestrict: POST
        consumes: application/json
      steps:
        - log:
            id: log-bom-received
            message: "Nhận BOM từ SAP: ${body}"
        - unmarshal:
            id: unmarshal-bom
            json:
              id: json-bom-unmarshal
        - setProperty:
            id: setProperty-sap-raw-data
            name: sapRawData
            expression:
              simple:
                id: simple-sap-raw
                expression: ${body}
        - removeHeaders:
            id: removeHeaders-bom
            pattern: "*"
        - transform:
            id: transform-bom-groovy
            expression:
              groovy:
                id: groovy-bom-transform
                expression: "def sapData = request.body\r\ndef stripAll = { s -> s.replaceFirst(\"^0+\", \"\") }\r\n\r\ndef erpnextPayload = [\r\n  item: stripAll(sapData.matnr),\r\n  quantity: sapData.baseqty?.trim()?.toFloat() ?: 1,\r\n  uom: 'PC',\r\n  items: []\r\n]\r\n\r\nsapData.items?.each { item ->\r\n  erpnextPayload.items << [\r\n    item_code: stripAll(item.component),\r\n    qty: item.quantity?.trim()?.toFloat() ?: 0\r\n  ]\r\n}\r\n\r\nreturn erpnextPayload\r\n"
        - marshal:
            id: marshal-bom
            json:
              id: json-bom-marshal
        - setProperty:
            id: setProperty-bom-json
            name: bomJson
            expression:
              simple:
                id: simple-bom-json
                expression: ${body}
        - setHeaders:
            id: setHeaders-bom-staging
            headers:
              - id: setHeader-bom-staging-content
                name: Content-Type
                expression:
                  constant:
                    id: constant-bom-staging-content
                    expression: application/json
              - id: setHeader-bom-staging-method
                name: CamelHttpMethod
                expression:
                  constant:
                    id: constant-bom-staging-method
                    expression: POST
              - id: setHeader-bom-staging-auth
                name: Authorization
                expression:
                  constant:
                    id: constant-bom-staging-auth
                    expression: token {{erpnext.staging.token}}
        - log:
            id: log-bom-staging-request
            message: "BOM to STAGING: ${body}"
        - to:
            id: to-bom-staging
            uri: https
            parameters:
              bridgeEndpoint: true
              throwExceptionOnFailure: false
              httpUri: "{{erpnext.staging.url}}{{erpnext.api.bom}}"
        - setProperty:
            id: setProperty-bom-staging-response
            name: bomStagingResponse
            expression:
              simple:
                id: simple-bom-staging-resp
                expression: ${body}
        - setProperty:
            id: setProperty-bom-staging-code
            name: bomStagingCode
            expression:
              simple:
                id: simple-bom-staging-code
                expression: ${header.CamelHttpResponseCode}
        - log:
            id: log-bom-staging-response
            message: "BOM STAGING Response [${header.CamelHttpResponseCode}]: ${body}"
        - removeHeaders:
            id: removeHeaders-bom-prod
            pattern: "*"
        - setBody:
            id: setBody-bom-reset-prod
            expression:
              simple:
                id: simple-bom-reset-prod
                expression: ${exchangeProperty.bomJson}
        - setHeaders:
            id: setHeaders-bom-prod
            headers:
              - id: setHeader-bom-prod-content
                name: Content-Type
                expression:
                  constant:
                    id: constant-bom-prod-content
                    expression: application/json
              - id: setHeader-bom-prod-method
                name: CamelHttpMethod
                expression:
                  constant:
                    id: constant-bom-prod-method
                    expression: POST
              - id: setHeader-bom-prod-auth
                name: Authorization
                expression:
                  constant:
                    id: constant-bom-prod-auth
                    expression: token {{erpnext.production.token}}
        - log:
            id: log-bom-prod-request
            message: "BOM to PRODUCTION: ${body}"
        - to:
            id: to-bom-prod
            uri: https
            parameters:
              bridgeEndpoint: true
              throwExceptionOnFailure: false
              httpUri: "{{erpnext.production.url}}{{erpnext.api.bom}}"
        - setProperty:
            id: setProperty-bom-prod-response
            name: bomProdResponse
            expression:
              simple:
                id: simple-bom-prod-resp
                expression: ${body}
        - setProperty:
            id: setProperty-bom-prod-code
            name: bomProdCode
            expression:
              simple:
                id: simple-bom-prod-code
                expression: ${header.CamelHttpResponseCode}
        - log:
            id: log-bom-prod-response
            message: "BOM PRODUCTION Response [${header.CamelHttpResponseCode}]: ${body}"
        - setBody:
            id: setBody-bom-final
            expression:
              groovy:
                id: groovy-bom-final
                expression: "def prodCode = exchange.getProperty('bomProdCode')\r\ndef prodResp = exchange.getProperty('bomProdResponse')\r\ndef sapData = exchange.getProperty('sapRawData')\r\n\r\n// Chuyển response thành String\r\ndef prodRespStr = prodResp ? prodResp.toString() : ''\r\n\r\ndef prodSuccess = (prodCode == '200' || prodCode == '201')\r\n\r\nif (prodSuccess) {\r\n    return [\r\n        objecttype: 'BOM',\r\n        objectcode: sapData?.bomnumber ?: '',\r\n        flag: 'S',\r\n        message: \"BOM created successfully\",\r\n        sessionid: exchange.exchangeId\r\n    ]\r\n} else {\r\n    def errorMsg = prodRespStr ?: 'Unknown error'\r\n    return [\r\n        objecttype: 'BOM',\r\n        objectcode: sapData?.bomnumber ?: '',\r\n        flag: 'E',\r\n        message: \"Failed to create BOM. HTTP Code: ${prodCode}. Error: ${errorMsg}\",\r\n        sessionid: exchange.exchangeId\r\n    ]\r\n}"
        - marshal:
            id: marshal-bom-final
            json:
              id: json-bom-final
        - log:
            id: log-bom-final-response
            message: "BOM Response to SAP (from Production): ${body}"
- route:
    id: route-sap-production-order
    from:
      id: from-production-order
      uri: platform-http
      parameters:
        httpMethodRestrict: POST
        consumes: application/json
        path: /api/sap/production-order
      steps:
        - log:
            id: log-po-received
            message: "Nhận dữ liệu PO từ SAP: ${body}"
        - unmarshal:
            id: unmarshal-po
            json:
              id: json-po-unmarshal
        - removeHeaders:
            id: removeHeaders-po-initial
            pattern: "*"
        - transform:
            id: transform-po-groovy
            expression:
              groovy:
                id: groovy-po-transform
                expression: >
                  def sapData = request.body

                  exchange.setProperty("sapRawData", sapData)

                  def stripAll = { s -> s.replaceFirst("^0+", "") }


                  // Transform raw materials items

                  def rawItems = sapData.items.collect { item ->
                      [
                          item_code: stripAll(item.itemcode),
                          qty: item.quantity,
                          uom: item.itemunit
                      ]
                  }


                  // Create po_items with nested raw_items

                  def erpPoItems = [[
                      item_code: stripAll(sapData.material),
                      planned_qty: sapData.orderquantity,
                      planned_start_date: sapData.startDate,
                      sap_bom_no: stripAll(sapData.bomid),
                      raw_items: rawItems
                  ]]


                  // Create final payload

                  def erpNextData = [
                      custom_sap_po_type: sapData.ordertype,
                      total_planned_qty: sapData.orderquantity,
                      name: stripAll(sapData.productionorder),
                      po_items: erpPoItems
                  ]


                  // Store production order name for checking

                  exchange.setProperty("productionOrderName",
                  stripAll(sapData.productionorder))


                  return erpNextData
        - setProperty:
            id: setProperty-po-erpnext
            name: PoErpnext
            expression:
              simple:
                id: simple-po-erpnext
                expression: ${body}
        - marshal:
            id: marshal-po
            json:
              id: json-po-marshal
        - setProperty:
            id: setProperty-po-json
            name: poJson
            expression:
              simple:
                id: simple-po-json
                expression: ${body}
        - removeHeaders:
            id: removeHeaders-check-staging
            pattern: "*"
        - setHeaders:
            id: setHeaders-check-staging
            headers:
              - id: setHeader-check-staging-method
                name: CamelHttpMethod
                expression:
                  constant:
                    id: constant-check-staging-method
                    expression: GET
              - id: setHeader-check-staging-auth
                name: Authorization
                expression:
                  constant:
                    id: constant-check-staging-auth
                    expression: token {{erpnext.staging.token}}
        - log:
            id: log-check-staging
            message: >-
              Checking if Production Plan exists in STAGING:
              ${exchangeProperty.productionOrderName}
        - toD:
            id: to-check-staging
            uri: >-
              https://{{erpnext.staging.url}}/api/resource/Production
              Plan/${exchangeProperty.productionOrderName}?bridgeEndpoint=true&throwExceptionOnFailure=false
        - setProperty:
            id: setProperty-staging-check-code
            name: stagingCheckCode
            expression:
              simple:
                id: simple-staging-check-code
                expression: ${header.CamelHttpResponseCode}
        - log:
            id: log-staging-check-result
            message: "STAGING check response [${header.CamelHttpResponseCode}]: ${body}"
        - choice:
            id: choice-staging-exists
            when:
              - id: when-staging-exists
                expression:
                  simple:
                    id: simple-staging-exists
                    expression: ${exchangeProperty.stagingCheckCode} == 200
                steps:
                  - log:
                      id: log-staging-exists
                      message: Production Plan exists in STAGING. Checking docstatus...
                  - unmarshal:
                      id: unmarshal-staging-check
                      json:
                        id: json-staging-check-unmarshal
                  - setProperty:
                      id: setProperty-1f5d
                      name: stg_sap_bom_no
                      expression:
                        simple:
                          id: simple-e169
                          expression: ${body[data][po_items][0][custom_sap_bom_no]}
                  - setProperty:
                      id: setProperty-staging-docstatus
                      name: stagingDocstatus
                      expression:
                        simple:
                          id: simple-staging-docstatus
                          expression: ${body[data][docstatus]}
                  - setProperty:
                      id: setProperty-670d
                      name: stgUom
                      expression:
                        simple:
                          id: simple-12e6
                          expression: ${body[data][po_items][0][stock_uom]}
                  - setProperty:
                      id: setProperty-0494
                      name: stgName
                      expression:
                        simple:
                          id: simple-4d3c
                          expression: ${body[data][po_items][0][name]}
                  - setProperty:
                      id: setProperty-staging-existing-bom
                      name: stagingExistingBomNo
                      expression:
                        simple:
                          id: simple-staging-existing-bom
                          expression: ${body[data][po_items][0][bom_no]}
                  - choice:
                      id: choice-staging-docstatus
                      when:
                        - id: when-staging-docstatus-0
                          expression:
                            simple:
                              id: simple-staging-docstatus-0
                              expression: ${exchangeProperty.stagingDocstatus} == 0
                          steps:
                            - log:
                                id: log-staging-can-update
                                message: STAGING docstatus = 0, will UPDATE
                            - setProperty:
                                id: setProperty-staging-method
                                name: stagingHttpMethod
                                expression:
                                  constant:
                                    id: constant-staging-method-put
                                    expression: PUT
                      otherwise:
                        id: otherwise-staging-skip
                        steps:
                          - log:
                              id: log-staging-skip
                              message: >-
                                STAGING docstatus ≠ 0
                                (${exchangeProperty.stagingDocstatus}), SKIP
                                update
                          - setProperty:
                              id: setProperty-staging-skip
                              name: stagingHttpMethod
                              expression:
                                constant:
                                  id: constant-staging-method-skip
                                  expression: SKIP
            otherwise:
              id: otherwise-staging-not-exists
              steps:
                - log:
                    id: log-staging-not-exists
                    message: >-
                      Production Plan does NOT exist in STAGING. Will CREATE
                      (POST)
                - setProperty:
                    id: setProperty-staging-post
                    name: stagingHttpMethod
                    expression:
                      constant:
                        id: constant-staging-method-post
                        expression: POST
        - choice:
            id: choice-staging-operation
            when:
              - id: when-staging-skip
                expression:
                  simple:
                    id: simple-staging-skip-check
                    expression: ${exchangeProperty.stagingHttpMethod} == 'SKIP'
                steps:
                  - log:
                      id: log-staging-skipped
                      message: Skipping STAGING operation
                  - setProperty:
                      id: setProperty-staging-skipped-code
                      name: poStagingCode
                      expression:
                        constant:
                          id: constant-staging-skip-code
                          expression: "999"
            otherwise:
              id: otherwise-staging-execute
              steps:
                - removeHeaders:
                    id: removeHeaders-po-staging
                    pattern: "*"
                - setBody:
                    id: setBody-po-staging
                    expression:
                      simple:
                        id: simple-po-staging-body
                        expression: ${exchangeProperty.poJson}
                - setHeaders:
                    id: setHeaders-po-staging
                    headers:
                      - id: setHeader-po-staging-content
                        name: Content-Type
                        expression:
                          constant:
                            id: constant-po-staging-content
                            expression: application/json
                      - id: setHeader-po-staging-method
                        name: CamelHttpMethod
                        expression:
                          simple:
                            id: simple-po-staging-method
                            expression: ${exchangeProperty.stagingHttpMethod}
                      - id: setHeader-po-staging-auth
                        name: Authorization
                        expression:
                          constant:
                            id: constant-po-staging-auth
                            expression: token {{erpnext.staging.token}}
                - log:
                    id: log-po-staging-request
                    message: >-
                      Production Plan to STAGING
                      (${exchangeProperty.stagingHttpMethod}): ${body}
                - choice:
                    id: choice-staging-post-or-put
                    when:
                      - id: when-staging-post
                        expression:
                          simple:
                            id: simple-staging-is-post
                            expression: ${exchangeProperty.stagingHttpMethod} == 'POST'
                        steps:
                          - toD:
                              id: to-po-staging-post
                              uri: >-
                                https://{{erpnext.staging.url}}{{erpnext.api.production.plan}}?bridgeEndpoint=true&throwExceptionOnFailure=false
                    otherwise:
                      id: otherwise-staging-put
                      steps:
                        - unmarshal:
                            id: unmarshal-staging-put-body
                            json:
                              id: json-staging-put-unmarshal
                        - transform:
                            id: transform-staging-put-wrapper
                            expression:
                              groovy:
                                id: groovy-staging-put-wrapper
                                expression: "def data = request.body\r\ndef existingBomNo = exchange.getProperty(\"stagingExistingBomNo\")\r\ndef existingName = exchange.getProperty(\"stgName\")\r\ndef existingUom = exchange.getProperty(\"stgUom\")\r\ndef existingSapBomNo = exchange.getProperty(\"stg_sap_bom_no\")\r\n\r\n\r\n// Bước 1: Luôn kiểm tra cấu trúc mảng po_items trước để tránh lỗi Null/Index\r\nif (data.po_items && data.po_items.size() > 0) {\r\n    def firstItem = data.po_items[0]\r\n\r\n    // Bước 2: Tách riêng từng trường, cái nào có dữ liệu cũ thì mới ghi đè/gán vào\r\n    if (existingBomNo) {\r\n        firstItem.bom_no = existingBomNo\r\n    }\r\n    \r\n    if (existingName) {\r\n        firstItem.name = existingName\r\n    }\r\n    \r\n    if (existingUom) {\r\n        firstItem.stock_uom = existingUom\r\n    }\r\n\r\n    if (existingSapBomNo) {\r\n        firstItem.custom_sap_bom_no = existingSapBomNo\r\n    }\r\n}\r\n\r\n// Bước 3: Trả về object bọc trong key 'data' theo đúng chuẩn ERPNext API\r\nreturn [data: data]"
                        - marshal:
                            id: marshal-staging-put-body
                            json:
                              id: json-staging-put-marshal
                        - log:
                            id: log-staging-put-with-bom
                            message: "STAGING PUT payload with bom_no: ${body}"
                        - toD:
                            id: to-po-staging-put
                            uri: >-
                              https://{{erpnext.staging.url}}/api/resource/Production
                              Plan/${exchangeProperty.productionOrderName}?bridgeEndpoint=true&throwExceptionOnFailure=false
                - setProperty:
                    id: setProperty-po-staging-code
                    name: poStagingCode
                    expression:
                      simple:
                        id: simple-po-staging-code
                        expression: ${header.CamelHttpResponseCode}
                - log:
                    id: log-po-staging-response
                    message: >-
                      Production Plan STAGING Response
                      (${exchangeProperty.stagingHttpMethod})
                      [${header.CamelHttpResponseCode}]: ${body}
        - removeHeaders:
            id: removeHeaders-check-prod
            pattern: "*"
        - setHeaders:
            id: setHeaders-check-prodd
            headers:
              - id: setHeader-check-prod-method
                name: CamelHttpMethod
                expression:
                  constant:
                    id: constant-check-prod-method
                    expression: GET
              - id: setHeader-check-prod-auth
                name: Authorization
                expression:
                  constant:
                    id: constant-check-prod-auth
                    expression: token {{erpnext.production.token}}
        - log:
            id: log-check-prod
            message: >-
              Checking if Production Plan exists in PRODUCTION:
              ${exchangeProperty.productionOrderName}
        - toD:
            id: to-check-prod
            uri: >-
              https://{{erpnext.production.url}}/api/resource/Production
              Plan/${exchangeProperty.productionOrderName}?bridgeEndpoint=true&throwExceptionOnFailure=false
        - setProperty:
            id: setProperty-prod-check-code
            name: prodCheckCode
            expression:
              simple:
                id: simple-prod-check-code
                expression: ${header.CamelHttpResponseCode}
        - log:
            id: log-prod-check-result
            message: >-
              PRODUCTION check response [${header.CamelHttpResponseCode}]:
              ${body}
        - choice:
            id: choice-prod-exists
            when:
              - id: when-prodd-exists
                expression:
                  simple:
                    id: simple-prod-exists
                    expression: ${exchangeProperty.prodCheckCode} == 200
                steps:
                  - log:
                      id: log-prod-exists
                      message: >-
                        Production Plan exists in PRODUCTION. Checking
                        docstatus...
                  - unmarshal:
                      id: unmarshal-prod-check
                      json:
                        id: json-prod-check-unmarshal
                  - setProperty:
                      id: setProperty-fdda
                      name: pro_sap_bom_no
                      expression:
                        simple:
                          id: simple-12e1
                          expression: ${body[data][po_items][0][custom_sap_bom_no]}
                  - setProperty:
                      id: setProperty-e723
                      name: proUom
                      expression:
                        simple:
                          id: simple-e472
                          expression: ${body[data][po_items][0][stock_uom]}
                  - setProperty:
                      id: setProperty-prod-docstatus
                      name: prodDocstatus
                      expression:
                        simple:
                          id: simple-prod-docstatus
                          expression: ${body[data][docstatus]}
                  - setProperty:
                      id: setProperty-3df8
                      name: proName
                      expression:
                        simple:
                          id: simple-2bb6
                          expression: ${body[data][po_items][0][name]}
                  - setProperty:
                      id: setProperty-prod-existing-bom
                      name: prodExistingBomNo
                      expression:
                        simple:
                          id: simple-prod-existing-bom
                          expression: ${body[data][po_items][0][bom_no]}
                  - choice:
                      id: choice-prod-docstatus
                      when:
                        - id: when-prod-docstatus-0
                          expression:
                            simple:
                              id: simple-prod-docstatus-0
                              expression: ${exchangeProperty.prodDocstatus} == 0
                          steps:
                            - log:
                                id: log-prod-can-update
                                message: PRODUCTION docstatus = 0, will UPDATE
                            - setProperty:
                                id: setProperty-prod-method
                                name: prodHttpMethod
                                expression:
                                  constant:
                                    id: constant-prod-method-put
                                    expression: PUT
                      otherwise:
                        id: otherwise-prod-skip
                        steps:
                          - log:
                              id: log-prod-skip
                              message: >-
                                PRODUCTION docstatus ≠ 0
                                (${exchangeProperty.prodDocstatus}), SKIP update
                          - setProperty:
                              id: setProperty-prod-skip
                              name: prodHttpMethod
                              expression:
                                constant:
                                  id: constant-prod-method-skip
                                  expression: SKIP
            otherwise:
              id: otherwise-prodd-not-exists
              steps:
                - log:
                    id: log-prod-not-exists
                    message: >-
                      Production Plan does NOT exist in PRODUCTION. Will CREATE
                      (POST)
                - setProperty:
                    id: setProperty-prod-post
                    name: prodHttpMethod
                    expression:
                      constant:
                        id: constant-prod-method-post
                        expression: POST
        - choice:
            id: choice-prod-operation
            when:
              - id: when-prod-skip
                expression:
                  simple:
                    id: simple-prod-skip-check
                    expression: ${exchangeProperty.prodHttpMethod} == 'SKIP'
                steps:
                  - log:
                      id: log-prod-skipped
                      message: Skipping PRODUCTION operation
                  - setProperty:
                      id: setProperty-prod-skipped-code
                      name: poProdCode
                      expression:
                        constant:
                          id: constant-prod-skip-code
                          expression: "999"
            otherwise:
              id: otherwise-prod-execute
              steps:
                - removeHeaders:
                    id: removeHeaders-po-prod
                    pattern: "*"
                - setBody:
                    id: setBody-po-prod
                    expression:
                      simple:
                        id: simple-po-prod-body
                        expression: ${exchangeProperty.poJson}
                - setHeaders:
                    id: setHeaders-po-prod
                    headers:
                      - id: setHeader-po-prod-content
                        name: Content-Type
                        expression:
                          constant:
                            id: constant-po-prod-content
                            expression: application/json
                      - id: setHeader-po-prod-method
                        name: CamelHttpMethod
                        expression:
                          simple:
                            id: simple-po-prod-method
                            expression: ${exchangeProperty.prodHttpMethod}
                      - id: setHeader-po-prod-auth
                        name: Authorization
                        expression:
                          constant:
                            id: constant-po-prod-auth
                            expression: token {{erpnext.production.token}}
                - log:
                    id: log-po-prod-request
                    message: >-
                      Production Plan to PRODUCTION
                      (${exchangeProperty.prodHttpMethod}): ${body}
                - choice:
                    id: choice-prod-post-or-put
                    when:
                      - id: when-prod-post
                        expression:
                          simple:
                            id: simple-prod-is-post
                            expression: ${exchangeProperty.prodHttpMethod} == 'POST'
                        steps:
                          - toD:
                              id: to-po-prod-post
                              uri: >-
                                https://{{erpnext.production.url}}/api/method/imes.api.production_plan.production_plan?bridgeEndpoint=true&throwExceptionOnFailure=false
                    otherwise:
                      id: otherwise-prod-put
                      steps:
                        - unmarshal:
                            id: unmarshal-prod-put-body
                            json:
                              id: json-prod-put-unmarshal
                        - transform:
                            id: transform-prod-put-wrapper
                            expression:
                              groovy:
                                id: groovy-prod-put-wrapper
                                expression: "def data = request.body\r\ndef existingBomNo = exchange.getProperty(\"prodExistingBomNo\")\r\ndef existingName = exchange.getProperty(\"proName\")\r\ndef existingUom = exchange.getProperty(\"proUom\")\r\ndef existingSapBomNo = exchange.getProperty(\"pro_sap_bom_no\")\r\n\r\n// Bước 1: Kiểm tra xem mảng po_items có phần tử nào không\r\nif (data.po_items && data.po_items.size() > 0) {\r\n    def firstItem = data.po_items[0]\r\n\r\n    // Bước 2: Kiểm tra từng biến, có giá trị mới gán\r\n    if (existingBomNo) firstItem.bom_no = existingBomNo\r\n    if (existingName) firstItem.name = existingName\r\n    if (existingUom) firstItem.stock_uom = existingUom\r\n    if (existingSapBomNo) firstItem.custom_sap_bom_no = existingSapBomNo\r\n}\r\n\r\nreturn [data: data]"
                        - marshal:
                            id: marshal-prod-put-body
                            json:
                              id: json-prod-put-marshal
                        - log:
                            id: log-prod-put-with-bom
                            message: "PRODUCTION PUT payload with bom_no: ${body}"
                        - toD:
                            id: to-po-prod-put
                            uri: >-
                              https://{{erpnext.production.url}}/api/resource/Production
                              Plan/${exchangeProperty.productionOrderName}?bridgeEndpoint=true&throwExceptionOnFailure=false
                - setProperty:
                    id: setProperty-po-prod-code
                    name: poProdCode
                    expression:
                      simple:
                        id: simple-po-prod-code
                        expression: ${header.CamelHttpResponseCode}
                - log:
                    id: log-po-prod-response
                    message: >-
                      Production Plan PRODUCTION Response
                      (${exchangeProperty.prodHttpMethod})
                      [${header.CamelHttpResponseCode}]: ${body}
                      (PO:${exchangeProperty.productionOrderName})
        - removeProperty:
            id: removeProperty-cleanup
            name: ${body}
        - removeHeader:
            id: removeHeader-cleanup
            name: "*"
        - setBody:
            id: setBody-po-final
            expression:
              simple:
                id: simple-po-final-body
                expression: "{\"status\": \"success\"}"
        - setHeader:
            id: setHeader-response-code
            name: CamelHttpResponseCode
            expression:
              constant:
                id: constant-response-code
                expression: "200"
        - setHeader:
            id: setHeader-po-final-content
            name: Content-Type
            expression:
              constant:
                id: constant-po-final-content
                expression: application/json
- route:
    id: route-sap-material-request
    nodePrefixId: route-3b0
    from:
      id: from-0a45
      uri: platform-http
      parameters:
        path: /api/sap/material-request
        httpMethodRestrict: POST
        consumes: application/json
      steps:
        - log:
            id: log-7a8c
            message: "Nhận material request từ SAP: ${body}"
        - unmarshal:
            id: unmarshal-d3e8
            json:
              id: json-d150
        - removeHeaders:
            id: removeHeaders-e5d5
            pattern: "*"
        - transform:
            id: transform-96c7
            expression:
              groovy:
                id: groovy-f94e
                expression: "import java.time.LocalDate\r\n\r\ndef sapDataArray = request.body\r\ndef filteredData = sapDataArray.findAll { it.transactionsource == \"ZPP703\" }\r\n\r\nexchange.setProperty(\"sapRawData\", filteredData)\r\n\r\nexchange.setProperty(\"allMrResults\", [])\r\nexchange.setProperty(\"totalMrCount\", filteredData.size())\r\n\r\ndef stripAll = { s ->\r\n    s ? s.toString().replaceFirst(\"^0+\", \"\") : \"\"\r\n}\r\n\r\ndef allResults = []\r\n\r\nfilteredData.each { sapData ->\r\n    def erpMrItems = sapData.items?.collect { item ->\r\n        [\r\n            item_code: stripAll(item.matnr),\r\n            schedule_date: item.bdter ?: LocalDate.now().toString(),\r\n            qty: item.bdmng?.toString()?.toFloat() ?: 0,\r\n            warehouse: item.umlgo,\r\n            from_warehouse: item.lgort,\r\n            uom: item.meins,\r\n            rate: 0,\r\n            amount: 0,\r\n            cost_center: \"Main - T\",\r\n            production_plan: stripAll(item.wempf)\r\n        ]\r\n    } ?: []\r\n\r\n    def firstItem = sapData.items ? sapData.items[0] : null\r\n    def commonProductionPlan = firstItem ? stripAll(firstItem.wempf) : \"\"\r\n    def commonScheduleDate = sapData.rsdat ?: LocalDate.now().toString()\r\n    def sourceWarehouse = firstItem ? firstItem.lgort : null\r\n    def targetWarehouse = firstItem ? firstItem.umlgo : null\r\n\r\n    def mrName = \"MR-\" + commonProductionPlan + \"-\" + stripAll(sapData.rsnum)\r\n\r\n    def mrData = [\r\n        name: mrName,\r\n        material_request_type: \"Material Transfer\",\r\n        company: \"TECOMEN\",\r\n        transaction_date: sapData.rsdat.toString(),\r\n        schedule_date: commonScheduleDate,\r\n        custom_production_plan: commonProductionPlan,\r\n        custom_sap_reservation_id: stripAll(sapData.rsnum),\r\n        set_from_warehouse: sourceWarehouse,\r\n        set_warehouse: targetWarehouse,\r\n        buying_price_list: \"Standard Buying\",\r\n        custom_notify_creator_on_workflow_update: 0,\r\n        items: erpMrItems\r\n    ]\r\n\r\n    allResults << mrData\r\n}\r\n\r\nreturn allResults\r\n"
        - log:
            id: log-mr-count
            message: >-
              Total Material Requests to process:
              ${exchangeProperty.totalMrCount}
        - split:
            id: split-mr-list
            expression:
              simple:
                id: simple-split-expression
                expression: ${body}
            parallelProcessing: false
            stopOnException: false
            steps:
              - setProperty:
                  id: setProperty-current-mr
                  name: currentMR
                  expression:
                    simple:
                      id: simple-current-mr
                      expression: ${body}
              - setProperty:
                  id: setProperty-reservation-id
                  name: reservationId
                  expression:
                    simple:
                      id: simple-reservation-id
                      expression: ${body[custom_sap_reservation_id]}
              - setProperty:
                  id: setProperty-mr-name
                  name: mrName
                  expression:
                    simple:
                      id: simple-mr-name
                      expression: ${body[name]}
              - marshal:
                  id: marshal-current-mr
                  json:
                    id: json-marshal-mr
              - setProperty:
                  id: setProperty-mr-json
                  name: mrJson
                  expression:
                    simple:
                      id: simple-mr-json
                      expression: ${body}
              - log:
                  id: log-processing-mr
                  message: >-
                    Processing MR with reservation_id:
                    ${exchangeProperty.reservationId}
              - removeHeaders:
                  id: removeHeaders-before-check-stg
                  pattern: "*"
              - setHeaders:
                  id: setHeaders-check-stg
                  headers:
                    - id: setHeader-check-stg-auth
                      name: Authorization
                      expression:
                        constant:
                          id: constant-check-stg-auth
                          expression: token {{erpnext.staging.token}}
                    - id: setHeader-check-stg-method
                      name: CamelHttpMethod
                      expression:
                        constant:
                          id: constant-check-stg-method
                          expression: GET
              - setHeader:
                  id: setHeader-filter-query-stg
                  name: CamelHttpQuery
                  expression:
                    simple:
                      id: simple-c472
                      expression: >-
                        filters=[["docstatus","!=",2],["custom_sap_reservation_id","=","${exchangeProperty.reservationId}"]]
              - log:
                  id: log-check-stg-existing
                  message: >-
                    Checking existing MR in STAGING for reservation_id:
                    ${exchangeProperty.reservationId}
              - toD:
                  id: toD-check-stg-existing
                  uri: >-
                    https://{{erpnext.staging.url}}/api/resource/Material
                    Request?bridgeEndpoint=true&throwExceptionOnFailure=false
              - setProperty:
                  id: setProperty-check-stg-code
                  name: checkStgCode
                  expression:
                    simple:
                      id: simple-check-stg-code
                      expression: ${header.CamelHttpResponseCode}
              - log:
                  id: log-check-stg-response
                  message: >-
                    STAGING Check Response [${header.CamelHttpResponseCode}]:
                    ${body}
              - choice:
                  id: choice-stg-mr-exists
                  when:
                    - id: when-stg-mr-exists
                      expression:
                        simple:
                          id: simple-stg-mr-exists
                          expression: ${exchangeProperty.checkStgCode} == '200'
                      steps:
                        - unmarshal:
                            id: unmarshal-check-stg-response
                            json:
                              id: json-check-stg-response
                        - setProperty:
                            id: setProperty-stg-mr-count
                            name: mrStgCount
                            expression:
                              groovy:
                                id: groovy-stg-count
                                expression: "request.body?.data?.size() ?: 0"
                        - choice:
                            id: choice-stg-count
                            when:
                              - id: when-stg-exists
                                expression:
                                  simple:
                                    id: simple-stg-count-gt-zero
                                    expression: ${exchangeProperty.mrStgCount} > 0
                                steps:
                                  - setProperty:
                                      id: setProperty-existing-stg-mr-name
                                      name: existingStgMrName
                                      expression:
                                        simple:
                                          id: simple-existing-stg-name
                                          expression: ${body[data][0][name]}
                                  - log:
                                      id: log-stg-mr-exists
                                      message: >-
                                        MR already exists in STAGING:
                                        ${exchangeProperty.existingStgMrName}.
                                        Skipping creation.
                                  - setProperty:
                                      id: setProperty-skip-stg-creation
                                      name: skipStgCreation
                                      expression:
                                        constant:
                                          id: constant-skip-stg-true
                                          expression: "true"
                            otherwise:
                              id: otherwise-stg-not-exists
                              steps:
                                - log:
                                    id: log-stg-mr-not-exists
                                    message: >-
                                      No existing MR found in STAGING.
                                      Proceeding with creation.
                                - setProperty:
                                    id: setProperty-proceed-stg-creation
                                    name: skipStgCreation
                                    expression:
                                      constant:
                                        id: constant-skip-stg-false
                                        expression: "false"
                  otherwise:
                    id: otherwise-check-stg-failed
                    steps:
                      - log:
                          id: log-check-stg-failed
                          message: >-
                            Check existing MR in STAGING failed. Proceeding with
                            creation anyway.
                      - setProperty:
                          id: setProperty-proceed-stg-anyway
                          name: skipStgCreation
                          expression:
                            constant:
                              id: constant-skip-stg-false-2
                              expression: "false"
              - choice:
                  id: choice-should-create-stg
                  when:
                    - id: when-should-create-stg
                      expression:
                        simple:
                          id: simple-should-create-stg
                          expression: ${exchangeProperty.skipStgCreation} == 'false'
                      steps:
                        - removeHeaders:
                            id: removeHeaders-before-create-stg
                            pattern: "*"
                        - setBody:
                            id: setBody-restore-stg-json
                            expression:
                              simple:
                                id: simple-restore-stg-json
                                expression: ${exchangeProperty.mrJson}
                        - setHeaders:
                            id: setHeaders-stg
                            headers:
                              - id: setHeader-staging-auth
                                name: Authorization
                                expression:
                                  constant:
                                    id: constant-staging-auth
                                    expression: token {{erpnext.staging.token}}
                              - id: setHeader-staging-content
                                name: Content-Type
                                expression:
                                  constant:
                                    id: constant-staging-content
                                    expression: application/json
                              - id: setHeader-staging-method
                                name: CamelHttpMethod
                                expression:
                                  constant:
                                    id: constant-staging-method
                                    expression: POST
                        - log:
                            id: log-stg-request
                            message: "Sending Material Request to STAGING: ${body}"
                        - to:
                            id: to-staging
                            uri: https
                            parameters:
                              bridgeEndpoint: true
                              throwExceptionOnFailure: false
                              httpUri: >-
                                {{erpnext.staging.url}}/api/resource/Material
                                Request
                        - setProperty:
                            id: setProperty-stg-response
                            name: mrStagingResponse
                            expression:
                              simple:
                                id: simple-staging-response
                                expression: ${body}
                        - setProperty:
                            id: setProperty-stg-code
                            name: mrStagingCode
                            expression:
                              simple:
                                id: simple-staging-code
                                expression: ${header.CamelHttpResponseCode}
                        - log:
                            id: log-stg-response
                            message: >-
                              STAGING Material Request Response
                              [${header.CamelHttpResponseCode}]: ${body}
                        - choice:
                            id: choice-staging-submit
                            when:
                              - id: when-stg-success
                                expression:
                                  simple:
                                    id: simple-check-staging-success
                                    expression: ${exchangeProperty.mrStagingCode} == '200'
                                steps:
                                  - unmarshal:
                                      id: unmarshal-stg-response
                                      json:
                                        id: json-staging-response
                                  - setProperty:
                                      id: setProperty-staging-mr-name
                                      name: mrStagingName
                                      expression:
                                        simple:
                                          id: simple-staging-mr-name
                                          expression: ${body[data][name]}
                                  - log:
                                      id: log-staging-mr-name
                                      message: >-
                                        STAGING Material Request Name:
                                        ${exchangeProperty.mrStagingName}
                                  - setBody:
                                      id: setBody-staging-submit
                                      expression:
                                        constant:
                                          id: constant-staging-submit-body
                                          expression: "{\"docstatus\": 1}"
                                  - setHeaders:
                                      id: setHeaders-staging-submit
                                      headers:
                                        - id: setHeader-staging-submit-auth
                                          name: Authorization
                                          expression:
                                            constant:
                                              id: constant-staging-submit-auth
                                              expression: token {{erpnext.staging.token}}
                                        - id: setHeader-staging-submit-content
                                          name: Content-Type
                                          expression:
                                            constant:
                                              id: constant-staging-submit-content
                                              expression: application/json
                                        - id: setHeader-staging-submit-method
                                          name: CamelHttpMethod
                                          expression:
                                            constant:
                                              id: constant-staging-submit-method
                                              expression: PUT
                                  - log:
                                      id: log-staging-submit-request
                                      message: >-
                                        Submitting STAGING Material Request:
                                        ${exchangeProperty.mrStagingName}
                                  - toD:
                                      id: toD-staging-submit
                                      uri: >-
                                        https://{{erpnext.staging.url}}/api/resource/Material
                                        Request/${exchangeProperty.mrStagingName}?bridgeEndpoint=true&throwExceptionOnFailure=false
                                  - log:
                                      id: log-staging-submit-response
                                      message: >-
                                        STAGING Submit Response
                                        [${header.CamelHttpResponseCode}]:
                                        ${body}
                            otherwise:
                              id: otherwise-stg-failed
                              steps:
                                - log:
                                    id: log-staging-create-failed
                                    message: >-
                                      STAGING Material Request creation failed,
                                      skip submit
                  otherwise:
                    id: otherwise-skip-stg-creation
                    steps:
                      - log:
                          id: log-skip-stg-creation
                          message: >-
                            Skipping STAGING MR creation because it already
                            exists
              - removeHeaders:
                  id: removeHeaders-before-check-prod
                  pattern: "*"
              - setHeaders:
                  id: setHeaders-check-prod
                  headers:
                    - id: setHeader-check-prod-auth
                      name: Authorization
                      expression:
                        constant:
                          id: constant-check-prod-auth
                          expression: token {{erpnext.production.token}}
                    - id: setHeader-check-prod-method
                      name: CamelHttpMethod
                      expression:
                        constant:
                          id: constant-check-prod-method
                          expression: GET
              - setHeader:
                  id: setHeader-filter-query-prod
                  name: CamelHttpQuery
                  expression:
                    simple:
                      id: simple-filter-query-prod
                      expression: >-
                        filters=[["docstatus","!=",2],["custom_sap_reservation_id","=","${exchangeProperty.reservationId}"]]
              - log:
                  id: log-check-prod-existing
                  message: >-
                    Checking existing MR in PRODUCTION for reservation_id:
                    ${exchangeProperty.reservationId}
              - toD:
                  id: toD-check-prod-existing
                  uri: >-
                    https://{{erpnext.production.url}}/api/resource/Material
                    Request?bridgeEndpoint=true&throwExceptionOnFailure=false
              - setProperty:
                  id: setProperty-check-prod-code
                  name: checkProdCode
                  expression:
                    simple:
                      id: simple-check-prod-code
                      expression: ${header.CamelHttpResponseCode}
              - log:
                  id: log-check-prod-response
                  message: >-
                    PRODUCTION Check Response [${header.CamelHttpResponseCode}]:
                    ${body}
              - choice:
                  id: choice-prod-mr-exists
                  when:
                    - id: when-prod-mr-exists
                      expression:
                        simple:
                          id: simple-prod-mr-exists
                          expression: ${exchangeProperty.checkProdCode} == '200'
                      steps:
                        - unmarshal:
                            id: unmarshal-check-prod-response
                            json:
                              id: json-check-prod-response
                        - setProperty:
                            id: setProperty-prod-mr-count
                            name: mrProdCount
                            expression:
                              groovy:
                                id: groovy-prod-count
                                expression: "request.body?.data?.size() ?: 0"
                        - choice:
                            id: choice-prod-count
                            when:
                              - id: when-prod-exists
                                expression:
                                  simple:
                                    id: simple-prod-count-gt-zero
                                    expression: ${exchangeProperty.mrProdCount} > 0
                                steps:
                                  - setProperty:
                                      id: setProperty-existing-prod-mr-name
                                      name: existingProdMrName
                                      expression:
                                        simple:
                                          id: simple-existing-prod-name
                                          expression: ${body[data][0][name]}
                                  - log:
                                      id: log-prod-mr-exists
                                      message: >-
                                        MR already exists in PRODUCTION:
                                        ${exchangeProperty.existingProdMrName}.
                                        Skipping creation.
                                  - setProperty:
                                      id: setProperty-skip-prod-creation
                                      name: skipProdCreation
                                      expression:
                                        constant:
                                          id: constant-skip-prod-true
                                          expression: "true"
                                  - script:
                                      id: script-add-exists-result
                                      expression:
                                        groovy:
                                          id: groovy-add-exists-result
                                          expression: >
                                            def results =
                                            exchange.getProperty("allMrResults")

                                            synchronized(results) {
                                              results << [
                                                reservation_id: exchange.getProperty("reservationId"),
                                                status: "exists",
                                                message: "Material Request already exists in PRODUCTION",
                                                mr_name: exchange.getProperty("existingProdMrName")
                                              ]
                                            }
                                  - setHeaders:
                                      id: setHeaders-mr-exists-log
                                      headers:
                                        - id: setHeader-sql-exists-mr-name
                                          name: sql_mr_name
                                          expression:
                                            simple:
                                              id: simple-sql-exists-mr-name
                                              expression: ${exchangeProperty.existingProdMrName}
                                        - id: setHeader-sql-exists-res-id
                                          name: sql_reservation_id
                                          expression:
                                            simple:
                                              id: simple-sql-exists-res-id
                                              expression: ${exchangeProperty.reservationId}
                                  - to:
                                      id: to-db-log-mr-exists
                                      uri: sql
                                      parameters:
                                        dataSource: "#sapLogDataSource"
                                        query: >-
                                          INSERT INTO material_request_response
                                          (mr_name, reservation_id,
                                          operation_type, response_body) VALUES
                                          (:#sql_mr_name, :#sql_reservation_id,
                                          'exists', CAST('{"message": "Material
                                          Request already exists"}' AS jsonb))
                                  - log:
                                      id: log-db-mr-exists
                                      message: >-
                                        Logged MR exists to DB:
                                        ${exchangeProperty.existingProdMrName}
                            otherwise:
                              id: otherwise-prod-not-exists
                              steps:
                                - log:
                                    id: log-prod-mr-not-exists
                                    message: >-
                                      No existing MR found in PRODUCTION.
                                      Proceeding with creation.
                                - setProperty:
                                    id: setProperty-proceed-prod-creation
                                    name: skipProdCreation
                                    expression:
                                      constant:
                                        id: constant-skip-prod-false
                                        expression: "false"
                  otherwise:
                    id: otherwise-check-prod-failed
                    steps:
                      - log:
                          id: log-check-prod-failed
                          message: >-
                            Check existing MR in PRODUCTION failed. Proceeding
                            with creation anyway.
                      - setProperty:
                          id: setProperty-proceed-prod-anyway
                          name: skipProdCreation
                          expression:
                            constant:
                              id: constant-skip-prod-false-2
                              expression: "false"
              - choice:
                  id: choice-should-create-prod
                  when:
                    - id: when-should-create-prod
                      expression:
                        simple:
                          id: simple-should-create-prod
                          expression: ${exchangeProperty.skipProdCreation} == 'false'
                      steps:
                        - setProperty:
                            id: setProperty-mr-db-data
                            name: mrDbData
                            expression:
                              groovy:
                                id: groovy-mr-db-prep
                                expression: "import groovy.json.JsonBuilder\r\ndef mr = exchange.getProperty(\"currentMR\") \r\ndef sapRaw = exchange.getProperty(\"sapRawData\")\r\nreturn [\r\n  mr_name: mr.name,\r\n  reservation_id: mr.custom_sap_reservation_id,\r\n  production_plan: mr.custom_production_plan,\r\n  transaction_date: mr.transaction_date,\r\n  schedule_date: mr.schedule_date,\r\n  source_warehouse: mr.set_from_warehouse,\r\n  target_warehouse: mr.set_warehouse,\r\n  sap_raw: new JsonBuilder(sapRaw).toString(),\r\n  erp_payload: new JsonBuilder(mr).toString()\r\n]\r\n"
                        - setHeaders:
                            id: setHeaders-mr-log-data
                            headers:
                              - id: setHeader-sql-mr-name
                                name: sql_mr_name
                                expression:
                                  simple:
                                    id: simple-sql-mr-name
                                    expression: ${exchangeProperty.mrDbData[mr_name]}
                              - id: setHeader-sql-res-id
                                name: sql_reservation_id
                                expression:
                                  simple:
                                    id: simple-sql-res-id
                                    expression: >-
                                      ${exchangeProperty.mrDbData[reservation_id]}
                              - id: setHeader-sql-prod-plan
                                name: sql_production_plan
                                expression:
                                  simple:
                                    id: simple-sql-prod-plan
                                    expression: >-
                                      ${exchangeProperty.mrDbData[production_plan]}
                              - id: setHeader-sql-tx-date
                                name: sql_transaction_date
                                expression:
                                  simple:
                                    id: simple-sql-tx-date
                                    expression: >-
                                      ${exchangeProperty.mrDbData[transaction_date]}
                              - id: setHeader-sql-sched-date
                                name: sql_schedule_date
                                expression:
                                  simple:
                                    id: simple-sql-sched-date
                                    expression: >-
                                      ${exchangeProperty.mrDbData[schedule_date]}
                              - id: setHeader-sql-src-wh
                                name: sql_source_warehouse
                                expression:
                                  simple:
                                    id: simple-sql-src-wh
                                    expression: >-
                                      ${exchangeProperty.mrDbData[source_warehouse]}
                              - id: setHeader-sql-tgt-wh
                                name: sql_target_warehouse
                                expression:
                                  simple:
                                    id: simple-sql-tgt-wh
                                    expression: >-
                                      ${exchangeProperty.mrDbData[target_warehouse]}
                              - id: setHeader-sql-sap-raw
                                name: sql_sap_raw
                                expression:
                                  simple:
                                    id: simple-sql-sap-raw
                                    expression: ${exchangeProperty.mrDbData[sap_raw]}
                              - id: setHeader-sql-erp-payload
                                name: sql_erp_payload
                                expression:
                                  simple:
                                    id: simple-sql-erp-payload
                                    expression: ${exchangeProperty.mrDbData[erp_payload]}
                        - to:
                            id: to-db-insert-mr-data
                            uri: sql
                            parameters:
                              dataSource: "#sapLogDataSource"
                              query: >-
                                INSERT INTO sap_material_request_log (mr_name,
                                reservation_id, production_plan,
                                transaction_date, schedule_date,
                                source_warehouse, target_warehouse,
                                sap_raw_data, erpnext_payload) VALUES
                                (:#sql_mr_name, :#sql_reservation_id,
                                :#sql_production_plan,
                                CAST(:#sql_transaction_date AS date),
                                CAST(:#sql_schedule_date AS date),
                                :#sql_source_warehouse, :#sql_target_warehouse,
                                CAST(:#sql_sap_raw AS
                                jsonb),CAST(:#sql_erp_payload AS jsonb)) ON
                                CONFLICT (mr_name) DO UPDATE SET sap_raw_data =
                                EXCLUDED.sap_raw_data, erpnext_payload =
                                EXCLUDED.erpnext_payload, updated_at =
                                CURRENT_TIMESTAMP
                        - log:
                            id: log-db-mr-saved
                            message: >-
                              Saved MR data to DB:
                              ${exchangeProperty.reservationId}
                        - removeHeaders:
                            id: removeHeaders-before-product
                            pattern: "*"
                        - setBody:
                            id: setBody-reset-product
                            expression:
                              simple:
                                id: simple-reset-prod
                                expression: ${exchangeProperty.mrJson}
                        - setHeaders:
                            id: setHeaders-product
                            headers:
                              - id: setHeader-prod-auth
                                name: Authorization
                                expression:
                                  constant:
                                    id: constant-prod-auth
                                    expression: token {{erpnext.production.token}}
                              - id: setHeader-prod-content
                                name: Content-Type
                                expression:
                                  constant:
                                    id: constant-prod-content
                                    expression: application/json
                              - id: setHeader-prod-method
                                name: CamelHttpMethod
                                expression:
                                  constant:
                                    id: constant-prod-method
                                    expression: POST
                        - log:
                            id: log-product-request
                            message: "Sending Material Request to PRODUCTION: ${body}"
                        - to:
                            id: to-prod
                            uri: https
                            parameters:
                              bridgeEndpoint: true
                              throwExceptionOnFailure: false
                              httpUri: >-
                                {{erpnext.production.url}}/api/resource/Material
                                Request
                        - setProperty:
                            id: setProperty-product-response
                            name: mrProdResponse
                            expression:
                              simple:
                                id: simple-prod-response
                                expression: ${body}
                        - setProperty:
                            id: setProperty-product-code
                            name: mrProdCode
                            expression:
                              simple:
                                id: simple-prod-code
                                expression: ${header.CamelHttpResponseCode}
                        - log:
                            id: log-product-response
                            message: >-
                              PRODUCTION Material Request Response POST
                              [${header.CamelHttpResponseCode}]: ${body} |
                              reservation_id: ${exchangeProperty.reservationId}
                        - choice:
                            id: choice-prod-submit
                            when:
                              - id: when-product-success
                                expression:
                                  simple:
                                    id: simple-check-prod-success
                                    expression: ${exchangeProperty.mrProdCode} == '200'
                                steps:
                                  - unmarshal:
                                      id: unmarshal-product-response
                                      json:
                                        id: json-prod-response
                                  - setProperty:
                                      id: setProperty-prod-mr-name
                                      name: mrProdName
                                      expression:
                                        simple:
                                          id: simple-prod-mr-name
                                          expression: ${body[data][name]}
                                  - log:
                                      id: log-prod-mr-name
                                      message: >-
                                        PRODUCTION Material Request Name:
                                        ${exchangeProperty.mrProdName}
                                  - setBody:
                                      id: setBody-prod-submit
                                      expression:
                                        constant:
                                          id: constant-prod-submit-body
                                          expression: "{\"docstatus\": 1}"
                                  - setHeaders:
                                      id: setHeaders-prod-submit
                                      headers:
                                        - id: setHeader-prod-submit-auth
                                          name: Authorization
                                          expression:
                                            constant:
                                              id: constant-prod-submit-auth
                                              expression: token {{erpnext.production.token}}
                                        - id: setHeader-prod-submit-content
                                          name: Content-Type
                                          expression:
                                            constant:
                                              id: constant-prod-submit-content
                                              expression: application/json
                                        - id: setHeader-prod-submit-method
                                          name: CamelHttpMethod
                                          expression:
                                            constant:
                                              id: constant-prod-submit-method
                                              expression: PUT
                                  - log:
                                      id: log-prod-submit-request
                                      message: >-
                                        Submitting PRODUCTION Material Request:
                                        ${exchangeProperty.mrProdName}
                                  - toD:
                                      id: toD-prod-submit
                                      uri: >-
                                        https://{{erpnext.production.url}}/api/resource/Material
                                        Request/${exchangeProperty.mrProdName}?bridgeEndpoint=true&throwExceptionOnFailure=false
                                  - log:
                                      id: log-prod-submit-response
                                      message: >-
                                        PRODUCTION Submit Response
                                        [${header.CamelHttpResponseCode}]:
                                        ${body}
                                  - script:
                                      id: script-add-success-result
                                      expression:
                                        groovy:
                                          id: groovy-add-success-result
                                          expression: >
                                            def results =
                                            exchange.getProperty("allMrResults")

                                            synchronized(results) {
                                              results << [
                                                reservation_id: exchange.getProperty("reservationId"),
                                                status: "created",
                                                message: "Material Request created and submitted successfully",
                                                mr_name: exchange.getProperty("mrProdName")
                                              ]
                                            }
                                  - setBody:
                                      id: setBody-mr-success-resp
                                      expression:
                                        simple:
                                          id: simple-mr-success-resp
                                          expression: ${exchangeProperty.mrProdResponse}
                                  - convertBodyTo:
                                      id: convertBodyTo-mr-success-resp
                                      type: java.lang.String
                                  - setHeader:
                                      id: setHeader-sql-mr-success-body
                                      name: sql_res_body
                                      expression:
                                        simple:
                                          id: simple-sql-mr-success-body
                                          expression: ${body}
                                  - setBody:
                                      id: setBody-mr-success-req
                                      expression:
                                        simple:
                                          id: simple-mr-success-req
                                          expression: ${exchangeProperty.mrJson}
                                  - convertBodyTo:
                                      id: convertBodyTo-mr-success-req
                                      type: java.lang.String
                                  - setHeader:
                                      id: setHeader-sql-mr-success-req
                                      name: sql_res_req
                                      expression:
                                        simple:
                                          id: simple-sql-mr-success-req
                                          expression: ${body}
                                  - setHeaders:
                                      id: setHeaders-mr-success-log
                                      headers:
                                        - id: setHeader-sql-success-mr-name
                                          name: sql_mr_name
                                          expression:
                                            simple:
                                              id: simple-sql-success-mr-name
                                              expression: ${exchangeProperty.mrProdName}
                                        - id: setHeader-sql-success-res-id
                                          name: sql_reservation_id
                                          expression:
                                            simple:
                                              id: simple-sql-success-res-id
                                              expression: ${exchangeProperty.reservationId}
                                        - id: setHeader-sql-success-code
                                          name: sql_http_code
                                          expression:
                                            simple:
                                              id: simple-sql-success-code
                                              expression: ${exchangeProperty.mrProdCode}
                                  - to:
                                      id: to-db-log-mr-success
                                      uri: sql
                                      parameters:
                                        dataSource: "#sapLogDataSource"
                                        query: >-
                                          INSERT INTO material_request_response
                                          (mr_name, reservation_id,
                                          operation_type, http_status_code,
                                          response_body, request_payload) VALUES
                                          (:#sql_mr_name, :#sql_reservation_id,
                                          'created', :#sql_http_code,
                                          CAST(:#sql_res_body AS jsonb),
                                          CAST(:#sql_res_req AS jsonb))
                                  - log:
                                      id: log-db-mr-success
                                      message: >-
                                        Logged MR success to DB:
                                        ${exchangeProperty.mrProdName}
                            otherwise:
                              id: otherwise-product-failed
                              steps:
                                - log:
                                    id: log-prod-create-failed
                                    message: >-
                                      PRODUCTION Material Request creation
                                      failed, skip submit
                                - script:
                                    id: script-add-failed-result
                                    expression:
                                      groovy:
                                        id: groovy-add-failed-result
                                        expression: >
                                          def results =
                                          exchange.getProperty("allMrResults")

                                          synchronized(results) {
                                            results << [
                                              reservation_id: exchange.getProperty("reservationId"),
                                              status: "failed",
                                              message: "Material Request creation failed in PRODUCTION",
                                              error: exchange.getProperty("mrProdResponse")
                                            ]
                                          }
                                - setBody:
                                    id: setBody-mr-failed-resp
                                    expression:
                                      simple:
                                        id: simple-mr-failed-resp
                                        expression: ${exchangeProperty.mrProdResponse}
                                - convertBodyTo:
                                    id: convertBodyTo-mr-failed-resp
                                    type: java.lang.String
                                - setHeader:
                                    id: setHeader-sql-mr-failed-body
                                    name: sql_res_body
                                    expression:
                                      simple:
                                        id: simple-sql-mr-failed-body
                                        expression: ${body}
                                - setBody:
                                    id: setBody-mr-failed-req
                                    expression:
                                      simple:
                                        id: simple-mr-failed-req
                                        expression: ${exchangeProperty.mrJson}
                                - convertBodyTo:
                                    id: convertBodyTo-mr-failed-req
                                    type: java.lang.String
                                - setHeader:
                                    id: setHeader-sql-mr-failed-req
                                    name: sql_res_req
                                    expression:
                                      simple:
                                        id: simple-sql-mr-failed-req
                                        expression: ${body}
                                - setHeaders:
                                    id: setHeaders-mr-failed-log
                                    headers:
                                      - id: setHeader-sql-failed-res-id
                                        name: sql_reservation_id
                                        expression:
                                          simple:
                                            id: simple-sql-failed-res-id
                                            expression: ${exchangeProperty.reservationId}
                                      - id: setHeader-sql-failed-code
                                        name: sql_http_code
                                        expression:
                                          simple:
                                            id: simple-sql-failed-code
                                            expression: ${exchangeProperty.mrProdCode}
                                - to:
                                    id: to-db-log-mr-failed
                                    uri: sql
                                    parameters:
                                      dataSource: "#sapLogDataSource"
                                      query: >-
                                        INSERT INTO material_request_response
                                        (reservation_id, operation_type,
                                        http_status_code, response_body,
                                        request_payload, error_message) VALUES
                                        (:#sql_reservation_id, 'failed',
                                        :#sql_http_code, CAST(:#sql_res_body AS
                                        jsonb), CAST(:#sql_res_req AS jsonb),
                                        'Material Request creation failed in
                                        PRODUCTION')
                                - log:
                                    id: log-db-mr-failed
                                    message: >-
                                      Logged MR failed to DB:
                                      ${exchangeProperty.reservationId}
                  otherwise:
                    id: otherwise-skip-prod-creation
                    steps:
                      - log:
                          id: log-skip-prod-creation
                          message: >-
                            Skipping PRODUCTION MR creation because it already
                            exists
        - setBody:
            id: setBody-final-result
            expression:
              groovy:
                id: groovy-final-result
                expression: |
                  def results = exchange.getProperty("allMrResults")
                  return [
                    status: "success",
                    total: results.size(),
                    processed: exchange.getProperty("totalMrCount"),
                    results: results
                  ]
        - marshal:
            id: marshal-final-response
            json:
              id: json-final-response
        - setHeader:
            id: setHeader-final-contentt
            name: Content-Type
            expression:
              constant:
                id: constant-final-content
                expression: application/json
        - log:
            id: log-final-response
            message: "Final Response to SAP: ${body}"
- route:
    id: route-sap-stock-entry
    from:
      id: from-sap-stock-entry
      uri: platform-http
      parameters:
        httpMethodRestrict: POST
        consumes: application/json
        path: /api/sap/stock-entry
      steps:
        - log:
            id: log-stock-entry-received
            message: "Nhận Stock Entry từ SAP: ${body}"
        - unmarshal:
            id: unmarshal-stock-entry
            json:
              id: json-stock-entry-unmarshal
        - log:
            id: log-stock-entry-parsed
            message: "Stock Entry data parsed: ${body}"
        - setBody:
            id: setBody-stock-entry-response
            expression:
              constant:
                id: constant-stock-entry-response
                expression: >-
                  {"status": "received", "message": "Stock Entry data logged
                  successfully"}
        - setHeader:
            id: setHeader-stock-entry-content
            name: Content-Type
            expression:
              constant:
                id: constant-stock-entry-content
                expression: application/json
        - setHeader:
            id: setHeader-stock-entry-code
            name: CamelHttpResponseCode
            expression:
              constant:
                id: constant-stock-entry-code
                expression: "200"
        - log:
            id: log-stock-entry-final
            message: "Stock Entry response: ${body}"
- beans:
    - name: sapLogDataSource
      type: com.zaxxer.hikari.HikariDataSource
      properties:
        jdbcUrl: "{{database.url}}"
        username: "{{database.username}}"
        password: "{{database.password}}"
        driverClassName: org.postgresql.Driver
        maximumPoolSize: 10
        poolName: SapLogDBPool
