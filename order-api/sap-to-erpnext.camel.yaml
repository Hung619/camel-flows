- route:
    id: route-sap-material-request
    nodePrefixId: route-3b0
    from:
      id: from-0a45
      uri: platform-http
      parameters:
        path: /api/sap/material-request
        httpMethodRestrict: POST
        consumes: application/json
      steps:
        - log:
            id: log-7a8c
            message: "Nhận material request từ SAP: ${body}"
        - unmarshal:
            id: unmarshal-d3e8
            json:
              id: json-d150
        - removeHeaders:
            id: removeHeaders-e5d5
            pattern: "*"
        - transform:
            id: transform-96c7
            expression:
              groovy:
                id: groovy-f94e
                expression: |
                  import java.time.LocalDate

                  def sapDataArray = request.body  
                  exchange.setProperty("sapRawData", sapDataArray)

                  // Initialize results list in exchange property
                  exchange.setProperty("allMrResults", [])
                  exchange.setProperty("totalMrCount", sapDataArray.size())

                  def stripAll = { s -> 
                      s ? s.toString().replaceFirst("^0+", "") : "" 
                  }

                  def uomMap = [
                      "PC": "Nos",
                      "KG": "Kg",
                      "ST": "Nos",
                      "M": "Nos"
                  ]

                  // Xử lý từng reservation request và tạo danh sách MR
                  def allResults = []

                  sapDataArray.each { sapData ->
                      // Tạo items cho mỗi reservation
                      def erpMrItems = sapData.items?.collect { item ->
                          [
                              item_code: stripAll(item.matnr),
                              schedule_date: item.bdter ?: LocalDate.now().toString(),
                              qty: item.bdmng?.toString()?.toFloat() ?: 0,
                              warehouse: item.umlgo,
                              from_warehouse: item.lgort,
                              uom: item.meins,
                              rate: 0,
                              amount: 0,
                              cost_center: "Main - T",
                              production_plan: stripAll(item.wempf)
                          ]
                      } ?: []
                      
                      // Lấy giá trị chung từ header và item đầu tiên
                      def firstItem = sapData.items ? sapData.items[0] : null
                      def commonProductionPlan = firstItem ? stripAll(firstItem.wempf) : ""
                      def commonScheduleDate = sapData.rsdat ?: LocalDate.now().toString()
                      def sourceWarehouse = firstItem ? firstItem.lgort : null
                      def targetWarehouse = firstItem ? firstItem.umlgo : null
                      
                      def mrData = [
                          material_request_type: "Material Transfer",
                          company: "TECOMEN",
                          transaction_date: sapData.rsdat.toString(),
                          schedule_date: commonScheduleDate,
                          custom_production_plan: commonProductionPlan,
                          custom_sap_reservation_id: stripAll(sapData.rsnum),
                          set_from_warehouse: sourceWarehouse,
                          set_warehouse: targetWarehouse,
                          buying_price_list: "Standard Buying",
                          custom_notify_creator_on_workflow_update: 0,
                          items: erpMrItems
                      ]
                      
                      allResults << mrData
                  }

                  // Trả về mảng các MR để xử lý từng cái một
                  return allResults
        - log:
            id: log-mr-count
            message: >-
              Total Material Requests to process:
              ${exchangeProperty.totalMrCount}
        - split:
            id: split-mr-list
            expression:
              simple:
                id: simple-split-expression
                expression: ${body}
            parallelProcessing: false
            stopOnException: false
            steps:
              - setProperty:
                  id: setProperty-current-mr
                  name: currentMR
                  expression:
                    simple:
                      id: simple-current-mr
                      expression: ${body}
              - setProperty:
                  id: setProperty-reservation-id
                  name: reservationId
                  expression:
                    simple:
                      id: simple-reservation-id
                      expression: ${body[custom_sap_reservation_id]}
              - marshal:
                  id: marshal-current-mr
                  json:
                    id: json-marshal-mr
              - setProperty:
                  id: setProperty-mr-json
                  name: mrJson
                  expression:
                    simple:
                      id: simple-mr-json
                      expression: ${body}
              - log:
                  id: log-processing-mr
                  message: >-
                    Processing MR with reservation_id:
                    ${exchangeProperty.reservationId}
              - removeHeaders:
                  id: removeHeaders-before-check-stg
                  pattern: "*"
              - setHeaders:
                  id: setHeaders-check-stg
                  headers:
                    - id: setHeader-check-stg-auth
                      name: Authorization
                      expression:
                        constant:
                          id: constant-check-stg-auth
                          expression: token {{erpnext.staging.token}}
                    - id: setHeader-check-stg-method
                      name: CamelHttpMethod
                      expression:
                        constant:
                          id: constant-check-stg-method
                          expression: GET
              - log:
                  id: log-check-stg-existing
                  message: >-
                    Checking existing MR in STAGING for reservation_id:
                    ${exchangeProperty.reservationId}
              - setHeader:
                  id: setHeader-filter-query-stg
                  name: CamelHttpQuery
                  expression:
                    simple:
                      id: simple-c472
                      expression: >-
                        filters=[["docstatus","!=",2],["custom_sap_reservation_id","=","${exchangeProperty.reservationId}"]]
              - toD:
                  id: toD-check-stg-existing
                  uri: >-
                    https://{{erpnext.staging.url}}/api/resource/Material
                    Request?bridgeEndpoint=true&throwExceptionOnFailure=false
              - setProperty:
                  id: setProperty-check-stg-response
                  name: checkStgResponse
                  expression:
                    simple:
                      id: simple-check-stg-response
                      expression: ${body}
              - setProperty:
                  id: setProperty-check-stg-code
                  name: checkStgCode
                  expression:
                    simple:
                      id: simple-check-stg-code
                      expression: ${header.CamelHttpResponseCode}
              - log:
                  id: log-check-stg-response
                  message: >-
                    STAGING Check Response [${header.CamelHttpResponseCode}]:
                    ${body}
              - choice:
                  id: choice-stg-mr-exists
                  when:
                    - id: when-stg-mr-exists
                      expression:
                        simple:
                          id: simple-stg-mr-exists
                          expression: ${exchangeProperty.checkStgCode} == '200'
                      steps:
                        - unmarshal:
                            id: unmarshal-check-stg-response
                            json:
                              id: json-check-stg-response
                        - setProperty:
                            id: setProperty-stg-mr-count
                            name: mrStgCount
                            expression:
                              groovy:
                                id: groovy-stg-count
                                expression: "request.body?.data?.size() ?: 0"
                        - choice:
                            id: choice-stg-count
                            when:
                              - id: when-stg-exists
                                expression:
                                  simple:
                                    id: simple-stg-count-gt-zero
                                    expression: ${exchangeProperty.mrStgCount} > 0
                                steps:
                                  - setProperty:
                                      id: setProperty-existing-stg-mr-name
                                      name: existingStgMrName
                                      expression:
                                        simple:
                                          id: simple-existing-stg-name
                                          expression: ${body[data][0][name]}
                                  - log:
                                      id: log-stg-mr-exists
                                      message: >-
                                        MR already exists in STAGING:
                                        ${exchangeProperty.existingStgMrName}.
                                        Skipping creation.
                                  - setProperty:
                                      id: setProperty-skip-stg-creation
                                      name: skipStgCreation
                                      expression:
                                        constant:
                                          id: constant-skip-stg-true
                                          expression: "true"
                            otherwise:
                              id: otherwise-stg-not-exists
                              steps:
                                - log:
                                    id: log-stg-mr-not-exists
                                    message: >-
                                      No existing MR found in STAGING.
                                      Proceeding with creation.
                                - setProperty:
                                    id: setProperty-proceed-stg-creation
                                    name: skipStgCreation
                                    expression:
                                      constant:
                                        id: constant-skip-stg-false
                                        expression: "false"
                  otherwise:
                    id: otherwise-check-stg-failed
                    steps:
                      - log:
                          id: log-check-stg-failed
                          message: >-
                            Check existing MR in STAGING failed. Proceeding with
                            creation anyway.
                      - setProperty:
                          id: setProperty-proceed-stg-anyway
                          name: skipStgCreation
                          expression:
                            constant:
                              id: constant-skip-stg-false-2
                              expression: "false"
              - choice:
                  id: choice-should-create-stg
                  when:
                    - id: when-should-create-stg
                      expression:
                        simple:
                          id: simple-should-create-stg
                          expression: ${exchangeProperty.skipStgCreation} == 'false'
                      steps:
                        - removeHeaders:
                            id: removeHeaders-before-create-stg
                            pattern: "*"
                        - setBody:
                            id: setBody-restore-stg-json
                            expression:
                              simple:
                                id: simple-restore-stg-json
                                expression: ${exchangeProperty.mrJson}
                        - setHeaders:
                            id: setHeaders-stg
                            headers:
                              - id: setHeader-staging-auth
                                name: Authorization
                                expression:
                                  constant:
                                    id: constant-staging-auth
                                    expression: token {{erpnext.staging.token}}
                              - id: setHeader-staging-content
                                name: Content-Type
                                expression:
                                  constant:
                                    id: constant-staging-content
                                    expression: application/json
                              - id: setHeader-staging-method
                                name: CamelHttpMethod
                                expression:
                                  constant:
                                    id: constant-staging-method
                                    expression: POST
                        - log:
                            id: log-stg-request
                            message: "Sending Material Request to STAGING: ${body}"
                        - to:
                            id: to-staging
                            uri: https
                            parameters:
                              bridgeEndpoint: true
                              throwExceptionOnFailure: false
                              httpUri: >-
                                {{erpnext.staging.url}}/api/resource/Material
                                Request
                        - setProperty:
                            id: setProperty-stg-response
                            name: mrStagingResponse
                            expression:
                              simple:
                                id: simple-staging-response
                                expression: ${body}
                        - setProperty:
                            id: setProperty-stg-code
                            name: mrStagingCode
                            expression:
                              simple:
                                id: simple-staging-code
                                expression: ${header.CamelHttpResponseCode}
                        - log:
                            id: log-stg-response
                            message: >-
                              STAGING Material Request Response
                              [${header.CamelHttpResponseCode}]: ${body}
                        - choice:
                            id: choice-staging-submit
                            when:
                              - id: when-stg-success
                                expression:
                                  simple:
                                    id: simple-check-staging-success
                                    expression: ${exchangeProperty.mrStagingCode} == '200'
                                steps:
                                  - unmarshal:
                                      id: unmarshal-stg-response
                                      json:
                                        id: json-staging-response
                                  - setProperty:
                                      id: setProperty-staging-mr-name
                                      name: mrStagingName
                                      expression:
                                        simple:
                                          id: simple-staging-mr-name
                                          expression: ${body[data][name]}
                                  - log:
                                      id: log-staging-mr-name
                                      message: >-
                                        STAGING Material Request Name:
                                        ${exchangeProperty.mrStagingName}
                                  - setBody:
                                      id: setBody-staging-submit
                                      expression:
                                        constant:
                                          id: constant-staging-submit-body
                                          expression: "{\"docstatus\": 1}"
                                  - setHeaders:
                                      id: setHeaders-staging-submit
                                      headers:
                                        - id: setHeader-staging-submit-auth
                                          name: Authorization
                                          expression:
                                            constant:
                                              id: constant-staging-submit-auth
                                              expression: token {{erpnext.staging.token}}
                                        - id: setHeader-staging-submit-content
                                          name: Content-Type
                                          expression:
                                            constant:
                                              id: constant-staging-submit-content
                                              expression: application/json
                                        - id: setHeader-staging-submit-method
                                          name: CamelHttpMethod
                                          expression:
                                            constant:
                                              id: constant-staging-submit-method
                                              expression: PUT
                                  - log:
                                      id: log-staging-submit-request
                                      message: >-
                                        Submitting STAGING Material Request:
                                        ${exchangeProperty.mrStagingName}
                                  - toD:
                                      id: toD-staging-submit
                                      uri: >-
                                        https://{{erpnext.staging.url}}/api/resource/Material
                                        Request/${exchangeProperty.mrStagingName}?bridgeEndpoint=true&throwExceptionOnFailure=false
                                  - log:
                                      id: log-staging-submit-response
                                      message: >-
                                        STAGING Submit Response
                                        [${header.CamelHttpResponseCode}]:
                                        ${body}
                            otherwise:
                              id: otherwise-stg-failed
                              steps:
                                - log:
                                    id: log-staging-create-failed
                                    message: >-
                                      STAGING Material Request creation failed,
                                      skip submit
                  otherwise:
                    id: otherwise-skip-stg-creation
                    steps:
                      - log:
                          id: log-skip-stg-creation
                          message: >-
                            Skipping STAGING MR creation because it already
                            exists
              - removeHeaders:
                  id: removeHeaders-before-check-prod
                  pattern: "*"
              - setHeaders:
                  id: setHeaders-check-prod
                  headers:
                    - id: setHeader-check-prod-auth
                      name: Authorization
                      expression:
                        constant:
                          id: constant-check-prod-auth
                          expression: token {{erpnext.production.token}}
                    - id: setHeader-check-prod-method
                      name: CamelHttpMethod
                      expression:
                        constant:
                          id: constant-check-prod-method
                          expression: GET
              - log:
                  id: log-check-prod-existing
                  message: >-
                    Checking existing MR in PRODUCTION for reservation_id:
                    ${exchangeProperty.reservationId}
              - setHeader:
                  id: setHeader-filter-query-prod
                  name: CamelHttpQuery
                  expression:
                    simple:
                      id: simple-filter-query-prod
                      expression: >-
                        filters=[["docstatus","!=",2],["custom_sap_reservation_id","=","${exchangeProperty.reservationId}"]]
              - toD:
                  id: toD-check-prod-existing
                  uri: >-
                    https://{{erpnext.production.url}}/api/resource/Material
                    Request?bridgeEndpoint=true&throwExceptionOnFailure=false
              - setProperty:
                  id: setProperty-check-prod-response
                  name: checkProdResponse
                  expression:
                    simple:
                      id: simple-check-prod-response
                      expression: ${body}
              - setProperty:
                  id: setProperty-check-prod-code
                  name: checkProdCode
                  expression:
                    simple:
                      id: simple-check-prod-code
                      expression: ${header.CamelHttpResponseCode}
              - log:
                  id: log-check-prod-response
                  message: >-
                    PRODUCTION Check Response [${header.CamelHttpResponseCode}]:
                    ${body}
              - choice:
                  id: choice-prod-mr-exists
                  when:
                    - id: when-prod-mr-exists
                      expression:
                        simple:
                          id: simple-prod-mr-exists
                          expression: ${exchangeProperty.checkProdCode} == '200'
                      steps:
                        - unmarshal:
                            id: unmarshal-check-prod-response
                            json:
                              id: json-check-prod-response
                        - setProperty:
                            id: setProperty-prod-mr-count
                            name: mrProdCount
                            expression:
                              groovy:
                                id: groovy-prod-count
                                expression: "request.body?.data?.size() ?: 0"
                        - choice:
                            id: choice-prod-count
                            when:
                              - id: when-prod-exists
                                expression:
                                  simple:
                                    id: simple-prod-count-gt-zero
                                    expression: ${exchangeProperty.mrProdCount} > 0
                                steps:
                                  - setProperty:
                                      id: setProperty-existing-prod-mr-name
                                      name: existingProdMrName
                                      expression:
                                        simple:
                                          id: simple-existing-prod-name
                                          expression: ${body[data][0][name]}
                                  - log:
                                      id: log-prod-mr-exists
                                      message: >-
                                        MR already exists in PRODUCTION:
                                        ${exchangeProperty.existingProdMrName}.
                                        Skipping creation.
                                  - setProperty:
                                      id: setProperty-skip-prod-creation
                                      name: skipProdCreation
                                      expression:
                                        constant:
                                          id: constant-skip-prod-true
                                          expression: "true"
                                  - script:
                                      id: script-add-exists-result
                                      expression:
                                        groovy:
                                          id: groovy-add-exists-result
                                          expression: >
                                            def results =
                                            exchange.getProperty("allMrResults")

                                            synchronized(results) {
                                              results << [
                                                reservation_id: exchange.getProperty("reservationId"),
                                                status: "exists",
                                                message: "Material Request already exists in PRODUCTION",
                                                mr_name: exchange.getProperty("existingProdMrName")
                                              ]
                                            }
                            otherwise:
                              id: otherwise-prod-not-exists
                              steps:
                                - log:
                                    id: log-prod-mr-not-exists
                                    message: >-
                                      No existing MR found in PRODUCTION.
                                      Proceeding with creation.
                                - setProperty:
                                    id: setProperty-proceed-prod-creation
                                    name: skipProdCreation
                                    expression:
                                      constant:
                                        id: constant-skip-prod-false
                                        expression: "false"
                  otherwise:
                    id: otherwise-check-prod-failed
                    steps:
                      - log:
                          id: log-check-prod-failed
                          message: >-
                            Check existing MR in PRODUCTION failed. Proceeding
                            with creation anyway.
                      - setProperty:
                          id: setProperty-proceed-prod-anyway
                          name: skipProdCreation
                          expression:
                            constant:
                              id: constant-skip-prod-false-2
                              expression: "false"
              - choice:
                  id: choice-should-create-prod
                  when:
                    - id: when-should-create-prod
                      expression:
                        simple:
                          id: simple-should-create-prod
                          expression: ${exchangeProperty.skipProdCreation} == 'false'
                      steps:
                        - removeHeaders:
                            id: removeHeaders-before-product
                            pattern: "*"
                        - setBody:
                            id: setBody-reset-product
                            expression:
                              simple:
                                id: simple-reset-prod
                                expression: ${exchangeProperty.mrJson}
                        - setHeaders:
                            id: setHeaders-product
                            headers:
                              - id: setHeader-prod-auth
                                name: Authorization
                                expression:
                                  constant:
                                    id: constant-prod-auth
                                    expression: token {{erpnext.production.token}}
                              - id: setHeader-prod-content
                                name: Content-Type
                                expression:
                                  constant:
                                    id: constant-prod-content
                                    expression: application/json
                              - id: setHeader-prod-method
                                name: CamelHttpMethod
                                expression:
                                  constant:
                                    id: constant-prod-method
                                    expression: POST
                        - log:
                            id: log-product-request
                            message: "Sending Material Request to PRODUCTION: ${body}"
                        - to:
                            id: to-prod
                            uri: https
                            parameters:
                              bridgeEndpoint: true
                              throwExceptionOnFailure: false
                              httpUri: >-
                                {{erpnext.production.url}}/api/resource/Material
                                Request
                        - setProperty:
                            id: setProperty-product-response
                            name: mrProdResponse
                            expression:
                              simple:
                                id: simple-prod-response
                                expression: ${body}
                        - setProperty:
                            id: setProperty-product-code
                            name: mrProdCode
                            expression:
                              simple:
                                id: simple-prod-code
                                expression: ${header.CamelHttpResponseCode}
                        - log:
                            id: log-product-response
                            message: >-
                              PRODUCTION Material Request Response
                              [${header.CamelHttpResponseCode}]: ${body}
                        - choice:
                            id: choice-prod-submit
                            when:
                              - id: when-product-success
                                expression:
                                  simple:
                                    id: simple-check-prod-success
                                    expression: ${exchangeProperty.mrProdCode} == '200'
                                steps:
                                  - unmarshal:
                                      id: unmarshal-product-response
                                      json:
                                        id: json-prod-response
                                  - setProperty:
                                      id: setProperty-prod-mr-name
                                      name: mrProdName
                                      expression:
                                        simple:
                                          id: simple-prod-mr-name
                                          expression: ${body[data][name]}
                                  - log:
                                      id: log-prod-mr-name
                                      message: >-
                                        PRODUCTION Material Request Name:
                                        ${exchangeProperty.mrProdName}
                                  - setBody:
                                      id: setBody-prod-submit
                                      expression:
                                        constant:
                                          id: constant-prod-submit-body
                                          expression: "{\"docstatus\": 1}"
                                  - setHeaders:
                                      id: setHeaders-prod-submit
                                      headers:
                                        - id: setHeader-prod-submit-auth
                                          name: Authorization
                                          expression:
                                            constant:
                                              id: constant-prod-submit-auth
                                              expression: token {{erpnext.production.token}}
                                        - id: setHeader-prod-submit-content
                                          name: Content-Type
                                          expression:
                                            constant:
                                              id: constant-prod-submit-content
                                              expression: application/json
                                        - id: setHeader-prod-submit-method
                                          name: CamelHttpMethod
                                          expression:
                                            constant:
                                              id: constant-prod-submit-method
                                              expression: PUT
                                  - log:
                                      id: log-prod-submit-request
                                      message: >-
                                        Submitting PRODUCTION Material Request:
                                        ${exchangeProperty.mrProdName}
                                  - toD:
                                      id: toD-prod-submit
                                      uri: >-
                                        https://{{erpnext.production.url}}/api/resource/Material
                                        Request/${exchangeProperty.mrProdName}?bridgeEndpoint=true&throwExceptionOnFailure=false
                                  - log:
                                      id: log-prod-submit-response
                                      message: >-
                                        PRODUCTION Submit Response
                                        [${header.CamelHttpResponseCode}]:
                                        ${body}
                                  - script:
                                      id: script-add-success-result
                                      expression:
                                        groovy:
                                          id: groovy-add-success-result
                                          expression: >
                                            def results =
                                            exchange.getProperty("allMrResults")

                                            synchronized(results) {
                                              results << [
                                                reservation_id: exchange.getProperty("reservationId"),
                                                status: "created",
                                                message: "Material Request created and submitted successfully",
                                                mr_name: exchange.getProperty("mrProdName")
                                              ]
                                            }
                            otherwise:
                              id: otherwise-product-failed
                              steps:
                                - log:
                                    id: log-prod-create-failed
                                    message: >-
                                      PRODUCTION Material Request creation
                                      failed, skip submit
                                - script:
                                    id: script-add-failed-result
                                    expression:
                                      groovy:
                                        id: groovy-add-failed-result
                                        expression: >
                                          def results =
                                          exchange.getProperty("allMrResults")

                                          synchronized(results) {
                                            results << [
                                              reservation_id: exchange.getProperty("reservationId"),
                                              status: "failed",
                                              message: "Material Request creation failed in PRODUCTION",
                                              error: exchange.getProperty("mrProdResponse")
                                            ]
                                          }
                  otherwise:
                    id: otherwise-skip-prod-creation
                    steps:
                      - log:
                          id: log-skip-prod-creation
                          message: >-
                            Skipping PRODUCTION MR creation because it already
                            exists
        - setBody:
            id: setBody-final-result
            expression:
              groovy:
                id: groovy-final-result
                expression: |
                  def results = exchange.getProperty("allMrResults")
                  return [
                    total: results.size(),
                    processed: exchange.getProperty("totalMrCount"),
                    results: results
                  ]
        - marshal:
            id: marshal-final-response
            json:
              id: json-final-response
        - setHeader:
            id: setHeader-final-contentsss
            name: Content-Type
            expression:
              constant:
                id: constant-final-content
                expression: application/json
        - log:
            id: log-final-response
            message: "Final Response to SAP: ${body}"
- route:
    id: route-sap-stock-entry
    from:
      id: from-sap-stock-entry
      uri: platform-http
      parameters:
        httpMethodRestrict: POST
        consumes: application/json
        path: /api/sap/stock-entry
      steps:
        - log:
            id: log-stock-entry-received
            message: "Nhận Stock Entry từ SAP: ${body}"
        - unmarshal:
            id: unmarshal-stock-entry
            json:
              id: json-stock-entry-unmarshal
        - log:
            id: log-stock-entry-parsed
            message: "Stock Entry data parsed: ${body}"
        - setBody:
            id: setBody-stock-entry-response
            expression:
              constant:
                id: constant-stock-entry-response
                expression: >-
                  {"status": "received", "message": "Stock Entry data logged
                  successfully"}
        - setHeader:
            id: setHeader-stock-entry-content
            name: Content-Type
            expression:
              constant:
                id: constant-stock-entry-content
                expression: application/json
        - setHeader:
            id: setHeader-stock-entry-code
            name: CamelHttpResponseCode
            expression:
              constant:
                id: constant-stock-entry-code
                expression: "200"
        - log:
            id: log-stock-entry-final
            message: "Stock Entry response: ${body}"
